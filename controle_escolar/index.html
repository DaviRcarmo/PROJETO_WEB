<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Controle Escolar</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <div class="container">
            <h1>Controle de Alunos</h1>

            <form id="form-aluno">
                <div class="form-group">
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" placeholder="Digite o nome">
                </div>

                <div class="form-group">
                    <label for="idade">Idade</label>
                    <input type="number" id="idade" placeholder="Digite a idade">
                </div>

                <div class="form-group">
                    <label for="nota">Nota</label>
                    <input type="number" id="nota" step="0.1" placeholder="0 a 10">
                </div>

                <button type="submit" class="btn">Cadastrar</button>
            </form>

            <p id="mensagem" class="mensagem"></p>

            <div class="estatisticas">
                <h2>Estatísticas</h2>
                <p>Total de alunos: <span id="total">0</span></p>
                <p>Média das notas: <span id="media">0</span></p>
                <p>Aprovados: <span id="aprovados">0</span></p>
                <p>Reprovados: <span id="reprovados">0</span></p>
            </div>

            <div class="lista">
                <h2>Alunos Cadastrados</h2>
                <div id="lista-alunos"></div>
            </div>
        </div>

        <script src="script.js"></script>

    </body>
</html>
